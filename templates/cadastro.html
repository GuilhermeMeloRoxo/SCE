<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>

    <!-- formulário para cadastro -->
    <main class="form-box">
        <h1>Cadastro</h1>
        <div id="form-cadastro">
            <form action="" method="POST">
                <div class="form-group">
                    <label for="nome" id="nome">Nome Completo</label>
                    <input type="text" name="nome" pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+ [A-Za-zÀ-ÖØ-öø-ÿ\s]+$" placeholder="Digite seu nome completo" required>
                </div>
                <div class="form-group">
                    <label for="cpf" id="cpf">CPF</label>
                    <input type="text" name="cpf" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" placeholder="Digite seu CPF    Ex.: 123.456.789-00" required>
                </div>
                <div class="form-group">
                    <label for="matricula" id="matricula">Matrícula</label>
                    <input type="text" name="matricula" pattern="[0-9]{4}[1-2]{1}[0-9]{6}" placeholder="Digite sua matrícula    Ex.: 202610012" required>
                </div>
                <div class="form-group">
                    <label for="senha" id="senha">Senha</label>
                    <input type="password" name="senha" minlength="8" pattern="[a-z0-9._%+-]" title="Por favor, insira no mínimo 8 dígitos" placeholder="Digite sua senha" required>
                </div>
                    <button type="submit">Finalize o cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
