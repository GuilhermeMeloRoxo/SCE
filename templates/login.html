<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCE</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <!-- formulário para login -->
    <main>
        <a href="cadastro.html">Criar perfil</a>
        <div class="form-logo"><img src="../static/images/logo.png" alt="Logo SCE"></div>
        <h1>Acesse seu perfil</h1>
        <div>
            <form id="form-login">
                <div>
                    <label for="cpf" id="cpf">CPF</label>
                    <input type="text" name="cpf" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" placeholder="Digite seu CPF" required>
                </div>
                <div>
                    <label for="senha" id="senha">Senha</label>
                    <input type="password" name="senha" minlength="8" pattern="[a-z0-9._%+-]" title="Por favor, insira sua senha" placeholder="Digite sua senha" required>
                </div>
                    <button onclick="handleClick('form-login')" type="submit">Acessar</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
