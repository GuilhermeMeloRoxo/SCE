<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCE</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-blue-900 flex items-center sm:justify-center">
    <!-- formulário para login -->
    <main class="bg-gray-200 p-8 shadow-2xl w-full max-w-2xl sm:rounded-2xl sm:mt-15 sm:px-18 lg:mx-auto">
        <div>
            <div class="text-right mt-2 mb-6"><a class="text-sm font-bold text-blue-900 py-2 px-4 border-2 shadow-xl rounded-3xl hover:bg-blue-900 hover:text-white hover:border-blue-900" href="/pages/cadastro/">Criar Perfil</a></div>
            <div class="flex justify-center pb-8"><img class="h-30 rounded-full sm:h-40" src="/logo.png" alt="Logo SCE"></div>
            <h1 class="text-3xl font-bold text-blue-950 pb-4">Acessar Perfil</h1>
            <form id="form-login" class="space-y-5" method="post">
                <div>
                    <label class="block text-gray-800 ml-1 mb-1" for="email" id="email">Email</label>
                    <input class="w-full text-sm px-4 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-blue-900 focus:border-transparent outline-none transition" type="email" name="email" title="Por favor, insira seu email" placeholder="Digite seu email" required>
                </div>
                <div>
                    <label class="block text-gray-800 ml-1 mb-1" for="senha" id="senha">Senha</label>
                    <input class="w-full text-sm px-4 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-blue-900 focus:border-transparent outline-none transition" type="password" name="senha" minlength="8" title="Por favor, insira sua senha" placeholder="Digite sua senha" required>
                </div>
                <div class="my-8.5 text-center text-gray-600">
                    <button class="w-full font-bold bg-blue-900 hover:bg-blue-950 text-white py-2.5 rounded-3xl cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl flex items-center justify-center"
                    id="btn-login"
                    type="submit">
                        <span id="btn-text">Login</span>
                        <svg id="btn-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                            <use href="/src/assets/icons.svg#carregando"></use>
                        </svg>
                    </button>
                </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="sm:mt-25">
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
