<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCE</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="bg-white flex items-center sm:justify-center">
    <!-- formulário para login -->
    <main class="bg-slate-50 p-8 shadow-2xl w-full max-w-2xl sm:rounded-2xl sm:mt-15 sm:px-18 lg:mx-auto">
        <div>
            <div class="text-right mt-2 mb-6"><a class="text-sm font-bold text-[#0b8aa0] py-2 px-4 border-2 shadow-xl rounded-3xl hover:bg-[#0b8aa0] hover:text-white hover:border-[#0b8aa0]" href="/pages/cadastro/">Criar Perfil</a></div>
            <div class="flex justify-center pb-8"><img class="h-30 shadow-xl rounded-full sm:h-40" src="/logo.png" alt="Logo SCE"></div>
            <h1 class="text-3xl font-bold text-[#0b8aa0] pb-4">Acessar Perfil</h1>
            <form id="form-login" class="space-y-5" method="post">
                <div>
                    <label class="block text-gray-800 ml-1 mb-1" for="email" id="email">Email</label>
                    <input class="w-full text-sm px-4 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition" type="email" name="email" title="Por favor, insira seu email" placeholder="Digite seu email" required>
                </div>
                <div>
                    <label class="block text-gray-800 ml-1 mb-1" for="senha" id="senha">Senha</label>
                    <div class="relative w-full">
                        <input id="input-senha" class="w-full text-sm pl-4 pr-12 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition" type="password" name="senha" minlength="8" title="Por favor, insira no mínimo 8 dígitos" placeholder="No mínimo 8 dígitos" required>         
                        <!-- botão olhinho -->
                        <button type="button" id="btn-olho" class="absolute right-4 bottom-1/2 translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none w-[18px] h-[18px]">
                            <span class="material-symbols-outlined w-[18px] h-[18px]" id="icone-olho">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="my-8.5 text-center text-gray-600">
                    <button class="w-full font-bold bg-[#0b8aa0] hover:bg-[#087487] text-white py-2.5 rounded-3xl cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl flex items-center justify-center"
                    id="btn-login"
                    type="submit">
                        <span id="btn-text">Login</span>
                        <svg id="btn-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                            <use href="/src/assets/icons.svg#carregando"></use>
                        </svg>
                    </button>
                    <div class="inline-flex text-center mt-2"><p class="pr-1 text-gray-900">Esqueceu a senha?</p><a id="openModalBtn" class="text-blue-900 cursor-pointer hover:underline">Alterar senha</a></div>
                </div>
            </form>
                <div id="modalOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 opacity-0 pointer-events-none transition-opacity duration-300">
                <div id="modalContent" class="w-full max-w-md scale-95 transform overflow-hidden rounded-2xl bg-white p-8 shadow-2xl transition-transform duration-300">
                <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-[#0b8aa0]">Alterar Senha</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">
                    <span class="material-symbols-outlined !text-2xl">close</span>
                </button>
                </div>
                <form method="post" id="passwordForm" class="mt-6 space-y-4">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-left text-gray-800 ml-1 mb-1">Nova Senha</label>
                            <input type="password" id="newPassword" placeholder="Digite sua nova senha" required class="w-full text-sm px-4 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition">
                        </div>
                        <div>
                            <label class="block text-left text-gray-800 ml-1 mb-1">Confirmar Nova Senha</label>
                            <input type="password" id="confirmPassword" placeholder="Digite novamente sua nova senha" required class="w-full text-sm px-4 py-2.5 border border-gray-400 rounded-3xl focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition">
                        </div>
                    </div>
                    <div class="mt-8 flex items-center justify-center gap-3">
                        <button id="cancel-password" type="button" class="px-8 py-2 border border-gray-300 rounded-3xl text-sm font-bold text-[#0b8aa0] hover:bg-gray-100 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <span id="cancel-pass-text">Cancelar</span>
                            <svg id="cancel-pass-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                                <use href="/src/assets/icons.svg#carregando"></use>
                            </svg>
                        </button>
                        <button id="edit-password" type="submit" class="px-6 py-2 bg-[#0b8aa0] hover:bg-[#087487] text-white rounded-3xl text-sm font-bold flex items-center gap-2 hover:bg-teal-800 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <span class="material-symbols-outlined !text-2xl text-white">check</span>
                        <span id="password-text">Salvar Alterações</span>
                            <svg id="password-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                                <use href="/src/assets/icons.svg#carregando"></use>
                            </svg>
                        </button>
                    </div>
                </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="sm:mt-25">
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
