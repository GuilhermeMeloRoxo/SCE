<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SCE</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen pt-10 ">
    <!-- formulário para cadastro -->
    <main class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="flex justify-center pb-8"><img class="h-50 rounded-full " src="/logo.png" alt="Logo SCE"></div>
        <h1 class="text-3xl font-bold text-gray-800 pb-4">Criar Perfil</h1>
        <div>
            <form id="form-cadastro" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="nome" id="nome">Nome Completo</label>
                    <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" type="text" name="nome" pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+ [A-Za-zÀ-ÖØ-öø-ÿ\s]+$" placeholder="Digite seu nome completo" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="email" id="email">Email</label>
                    <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" type="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Por favor, insira o seu email pessoal" placeholder="Ex.: nome@exemplo.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="cpf" id="cpf">CPF</label>
                    <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" type="text" name="cpf" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" placeholder="Ex.: 123.456.789-00" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="senha" id="senha">Senha</label>
                    <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" type="password" name="senha" minlength="8" pattern="[a-z0-9._%+-]" title="Por favor, insira no mínimo 8 dígitos" placeholder="Digite sua senha, no mínimo 8 dígitos" required>
                </div>
                <div class="mt-6 text-center text-sm text-gray-600">
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition duration-300 shadow-md" onclick="handleClick('form-cadastro')" type="submit">Criar perfil</button>
                    <a href="/pages/login/" class="text-blue-600 font-medium hover:underline">Já tenho perfil</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
