<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SCE</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <!-- formulário para cadastro -->
    <main>
        <div class="form-logo"><img src="/logo.png" alt="Logo SCE"></div>
        <h1>Crie seu perfil</h1>
        <div>
            <form id="form-cadastro">
                <div>
                    <label for="nome" id="nome">Nome Completo</label>
                    <input type="text" name="nome" pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+ [A-Za-zÀ-ÖØ-öø-ÿ\s]+$" placeholder="Digite seu nome completo" required>
                </div>
                <div>
                    <label for="email" id="email">Email</label>
                    <input type="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Por favor, insira o seu email pessoal" placeholder="Ex.: nome@exemplo.com" required>
                </div>
                <div>
                    <label for="cpf" id="cpf">CPF</label>
                    <input type="text" name="cpf" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" placeholder="Ex.: 123.456.789-00" required>
                </div>
                <div>
                    <label for="senha" id="senha">Senha</label>
                    <input type="password" name="senha" minlength="8" pattern="[a-z0-9._%+-]" title="Por favor, insira no mínimo 8 dígitos" placeholder="Digite sua senha, no mínimo 8 dígitos" required>
                </div>
                    <button onclick="handleClick('form-cadastro')" type="submit">Criar perfil</button>
                    <a href="/pages/login/">Já tenho perfil</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
