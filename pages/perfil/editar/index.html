<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SCE</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>

    <!-- postagens do mural -->
    <div class="sm:mx-12">
        <nav class="m-6 inline-flex text-sm font-medium sm:text-base sm:ml-0">
            <a href="/pages/perfil/" class="text-gray-500 hover:text-[#008b8b] transition-colors">Seu Perfil</a>
            <p class="text-gray-500 cursor-default">&nbsp; > &nbsp;</p>
            <a href="/pages/perfil/editar/" class="font-semibold text-[#008b8b] hover:text-gray-500">Editar Perfil</a>
        </nav>
        <div id="edit-profile" class="w-full flex flex-col md:flex-row gap-6">
            <aside class="w-full md:w-1/3 bg-slate-50 rounded-xl shadow-md border border-gray-100 p-8 flex flex-col items-center text-center animate-pulse">
                <div class="relative mb-6 mt-4">
                    <div class="w-48 h-48 rounded-full bg-slate-200 mb-8 border-4 border-white shadow-lg"></div>
                </div>
                <h2 class="h-8 w-3/4 bg-slate-200 rounded-lg text-[26px] font-bold"></h2>
                <span class="h-4 w-2/3 bg-slate-200 rounded-md text-[16px] px-2 mt-4 mb-8"></span>
                <div class="w-full space-y-8 text-left border-t mt-4 border-slate-200 pt-6">
                    <div>
                        <span class="flex flex-col gap-2 mt-2 leading-none">
                            <div class="h-6 w-1/3 bg-slate-200 rounded-md"></div>
                            <div class="h-6 w-2/3 bg-slate-200 rounded-md"></div>
                        </span>
                    </div>
                </div>
                <div class="w-full mt-6 text-left">
                    <div>
                        <span class="flex flex-col gap-2 mt-2 leading-none">
                            <div class="h-6 w-1/3 bg-slate-200 rounded-md"></div>
                            <div class="h-6 w-2/3 bg-slate-200 rounded-md"></div>
                        </span>
                    </div>
                <div class="mt-12 p-4 bg-blue-50/50 border-2 border-[#008b8b]/20 rounded-lg flex gap-3 text-left w-full">
                    <div class="w-6 h-6 bg-[#008b8b]/20 rounded-full"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-[#008b8b]/20 rounded w-6/8"></div>
                        <div class="h-3 bg-[#008b8b]/20 rounded w-6/7"></div>
                        <div class="h-3 bg-[#008b8b]/20 rounded w-4/6"></div>
                        <div class="h-3 bg-[#008b8b]/20 rounded w-full"></div>
                    </div>
                </div>
            </aside>
            <main class="w-full md:w-2/3 bg-white rounded-xl shadow-md border border-gray-100 p-10">
                <div class="mb-6 ml-4">
                    <div class="inline-flex">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tight">Editar Perfil</h1>
                    </div>
                    <div class="h-1.5 w-20 bg-[#0b8aa0] mt-4 rounded-full"></div>
                    <p class="text-sm text-gray-500 my-6">Atualize suas informações pessoais e acadêmicas.</p>
                </div>
                <form method="post" id="form-edit" class="w-full max-w-4xl p-4 lg:grid lg:grid-cols-2 lg:gap-10">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold m-2">Nome Completo *</label>
                            <input id="nome-completo" type="text" placeholder="Digite seu nome completo" pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+ [A-Za-zÀ-ÖØ-öø-ÿ\s]+$" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition required">
                        </div>
                        <div>
                            <label class="block text-sm font-bold m-2">Email *</label>
                            <input id="email" type="email" placeholder="Ex.: nome@exemplo.com" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition required">
                        </div>
                        <div>
                            <label class="block text-sm font-bold m-2">CPF *</label>
                            <input id="cpf" type="text" placeholder="Ex.: 123.456.789-00" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition required">
                        </div>
                        <div>
                            <label class="block text-sm font-bold m-2">Telefone</label>
                            <input id="telefone" type="tel" placeholder="Ex.: 83987654321" pattern="[0-9]{2}9[0-9]{8}" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold m-2">Matrícula Institucional *</label>
                            <input id="matricula-institucional" type="text" placeholder="Ex.: 20261230012" pattern="[0-9]{9}[0-9]*|[0-9]{7}" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition required">
                        </div>
                        <div>
                            <label class="block text-sm font-bold m-2">Egressos/Docentes *</label>
                            <div class="relative">
                                <select id="opcoes" required class="px-4 py-2.5 w-full cursor-pointer border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition appearance-none bg-white">
                                    <option value="" disabled selected>Selecione uma opção</option>
                                    <optgroup label="Cursos Superiores">
                                        <option value="Engenharia Elétrica">Engenharia Elétrica</option>
                                        <option value="Engenharia de Software">Engenharia de Software</option>
                                        <option value="Redes de Computadores">Redes de Computadores</option>
                                        <option value="Sistemas para Internet">Sistemas para Internet</option>
                                    </optgroup>
                                    <optgroup label="Mestrado">
                                        <option value="Tecnologia da Informação">Tecnologia da Informação</option>
                                    </optgroup>
                                    <optgroup label="Corpo Docente">
                                        <option value="Coordenador">Coordenador</option>
                                        <option value="Professor">Professor</option>
                                    </optgroup>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                                    <svg class="fill-current h-4 w-4" xmlns="http://w3.org" viewBox="0 0 20 20">
                                        <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                                    </svg>
                                </div>
                            </div>
                            </div>
                        <div>
                            <label class="block text-sm font-bold m-2">Data de Formação *</label>
                            <input id="data-formacao" type="text" pattern="[0-9]{4}\.[0-9]{1}" placeholder="Ex.: 2026.1" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold m-2">Username *</label>
                            <input type="text" id="input-username" placeholder="Ex.: nome_sobrenome" title="Digite no mínimo 3 dígitos (letras, números, hífen e/ou underline) e no máximo 20" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition" required>
                            <span id="icons-username" class="absolute right-4 bottom-1/2 translate-y-1/2 w-[18px] h-[18px]">
                                
                            </span>
                        </div>
                    </div>
                    <div class="bg-slate-100 max-w-150 border mx-auto mt-10 lg:mt-4 border-gray-300 rounded-xl flex justify-center items-center gap-4 p-4 shadow col-span-2">
                       <div class="w-16 h-16 bg-[#008b8b] rounded-full flex items-center justify-center text-white shrink-0">
                           <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                       </div>
                       <div>
                           <p class="text-md font-bold">Foto de Perfil</p>
                           <p class="text-xs text-gray-400 mb-2">Formatos aceitos: JPG, PNG. Tamanho máximo: 2MB.</p>
                           <button type="button" class="text-white ml-auto cursor-pointer bg-[#008b8b] rounded-3xl px-4 py-1 text-xs font-bold flex items-center gap-2 hover:bg-[#087487] transition duration-300">
                           <span class="material-symbols-outlined !text-lg text-white">upload</span>
                               Alterar foto
                           </button>
                       </div>
                    </div>
                    <div class="md:col-span-2 flex justify-end gap-4 mt-12 lg:mt-8">
                        <button id="btn-cancel" type="button" class="px-8 py-2 border border-gray-300 rounded-3xl text-sm font-bold text-[#0b8aa0] hover:bg-gray-100 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <span id="cancel-text">Cancelar</span>
                            <svg id="cancel-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                                <use href="/src/assets/icons.svg#carregando"></use>
                            </svg>
                        </button>
                        <button id="btn-edit" type="submit" class="px-6 py-2 bg-[#0b8aa0] hover:bg-[#087487] text-white rounded-3xl text-sm font-bold flex items-center gap-2 hover:bg-teal-800 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <span class="material-symbols-outlined !text-2xl text-white">check</span>
                        <span id="submit-text">Salvar Alterações</span>
                            <svg id="submit-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                                <use href="/src/assets/icons.svg#carregando"></use>
                            </svg>
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <!-- autoexplicativo-->
    <footer class="sm:mt-12">
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
