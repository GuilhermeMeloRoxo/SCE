<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Perfil</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>

    <main class="min-h-[calc(100vh-65px-150px)] bg-white flex">
        
        <div class="flex w-full flex-col lg:flex-row"> 
            <div class="w-full flex-shrink-0 lg:w-[350px] bg-slate-50 p-10 flex flex-col items-center justify-center border-r border-slate-200" id="profile-container">
                <!-- espaço pra foto -->
                <div class="animate-pulse flex flex-col items-center w-full">
                    <!-- Foto de Perfil Skeleton -->
                    <div class="w-48 h-48 rounded-full bg-slate-200 mb-8 border-4 border-white shadow-lg"></div>
                    
                    <!-- Nome e Email Skeleton -->
                    <div class="space-y-3 flex flex-col items-center w-full">
                        <div class="h-8 w-3/4 bg-slate-200 rounded-lg"></div>
                        <div class="h-4 w-1/2 bg-slate-200 rounded-md"></div>
                    </div>
                    
                    <!-- Informações Adicionais Skeleton -->
                    <div class="mt-12 space-y-8 text-left w-full border-t border-slate-200 pt-10 px-4">
                        <!-- Curso -->
                        <div class="space-y-2">
                            <div class="h-3 w-16 bg-slate-200 rounded uppercase"></div>
                            <div class="h-6 w-full bg-slate-200 rounded-md"></div>
                        </div>
                        
                        <!-- Data de Formação -->
                        <div class="space-y-2">
                            <div class="h-3 w-24 bg-slate-200 rounded uppercase"></div>
                            <div class="h-6 w-3/4 bg-slate-200 rounded-md"></div>
                        </div>
                    </div>

                    <!-- Botão ou Link de Ação Skeleton -->
                    <div class="mt-10 h-10 w-full bg-slate-200 rounded-xl"></div>
                </div>
            </div>

            <div class="flex-1 bg-white px-8 py-2 sm:py-8 overflow-y-auto">
                <div class="max-w-[1400px]">
                    <div>
                        <div class="mb-12 mt-6">
                            <div class="inline-flex"><h1 class="text-4xl font-black text-slate-900 tracking-tight">Seu Perfil</h1>
                            <a href="/pages/perfil/editar/"><span class="material-symbols-outlined !text-2xl pl-4 pt-1text-[#666] hover:text-[#087487] transition-colors">edit</span></a></div>
                            <div class="h-1.5 w-20 bg-[#0b8aa0] flex flex-col mt-4 rounded-full"></div>
                        </div>
                    </div>
                    <!-- grid dos cards github e linkedin) -->
                    <div class="flex flex-col gap-12 xl:flex-row">
                        <div id="github-container" class="w-full xl:w-[60%]">
                            <div class="animate-pulse">
                                    <!-- Cabeçalho Skeleton -->
                                    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8">
                                        <div class="h-3 w-48 bg-slate-200 rounded"></div>
                                        <div class="h-4 w-20 bg-slate-200 rounded"></div>
                                    </div>

                                    <div class="flex flex-col gap-8 xl:flex-row">
                                        <!-- Lado Esquerdo: Cards de Repositórios Skeleton -->
                                        <div class="flex-grow space-y-6">
                                            <!-- Card 1 -->
                                            <div class="rounded-[28px] border border-slate-100 bg-slate-50/50 p-6">
                                                <div class="h-2 w-20 bg-slate-200 rounded mb-4"></div>
                                                <div class="h-5 w-3/4 bg-slate-200 rounded mb-2"></div>
                                                <div class="h-4 w-1/2 bg-slate-200 rounded"></div>
                                            </div>
                                            <!-- Card 2 -->
                                            <div class="rounded-[28px] border border-slate-100 bg-slate-50/50 p-6">
                                                <div class="h-2 w-20 bg-slate-200 rounded mb-4"></div>
                                                <div class="h-5 w-2/3 bg-slate-200 rounded mb-2"></div>
                                                <div class="h-4 w-1/3 bg-slate-200 rounded"></div>
                                            </div>
                                        </div>

                                        <!-- Lado Direito: Estatísticas Skeleton -->
                                        <div class="flex-shrink-0 flex flex-col justify-between w-full xl:w-56 rounded-[28px] border border-slate-100 bg-slate-50/50 p-8 h-[280px]">
                                            <div class="flex items-center justify-between">
                                                <div class="h-4 w-20 bg-slate-200 rounded"></div>
                                                <div class="h-6 w-10 bg-slate-200 rounded"></div>
                                            </div>
                                            <div class="py-6 my-6 border-y border-slate-200 flex items-center justify-between">
                                                <div class="h-4 w-20 bg-slate-200 rounded"></div>
                                                <div class="h-6 w-10 bg-slate-200 rounded"></div>
                                            </div>
                                            <div class="flex items-center justify-between">
                                                <div class="h-4 w-16 bg-slate-200 rounded"></div>
                                                <div class="h-6 w-8 bg-slate-200 rounded"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    <!-- ainda não tem linkedin, falta pesquisar mais sobre a api -->
                        <div class="w-full xl:w-[40%]" id="linkedin-container">
                            <div class="rounded-[32px] border border-slate-100 bg-white p-8 shadow-sm transition-all duration-500 hover:shadow-2xl hover:-translate-y-1.5 hover:bg-slate-50/50 group">                     
                                <div class="flex items-start justify-between mb-6">
                                    <div class="flex items-center gap-4">
                                        <div class="bg-white p-1 rounded-lg">
                                            <svg class="w-10 h-10 transition-transform duration-300 group-hover:scale-110" fill="#0b8aa0">
                                                <use href="/src/assets/icons.svg#linkedin"></use>
                                            </svg>
                                        </div>
                                        <div>
                                            <span class="block text-[16px] font-bold">Trajeto no LinkedIn</span>
                                            <span class="block text-[12px] text-slate-400">Resumo da sua atividade profissional</span>
                                        </div>
                                    </div>
                                    <a href="#" class="text-[14px] font-bold text-[#0b8aa0] transition-transform duration-300 group-hover:scale-110 hover:underline hover:text-[#087487]">Ver perfil</a>
                                </div>

                                <!-- Conteúdo Central: Experiências Profissionais -->
                                <div class="space-y-4 mb-8">
                                    <!-- Cargo Atual: Efeito individual de profundidade e cor -->
                                    <div class="rounded-[24px] border border-slate-100 bg-slate-50/50 p-5 transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-1 hover:border-[#0b8aa0]/30 sub-group cursor-default group/item">
                                        <span class="block text-[16px] uppercase tracking-widest font-bold transition-colors duration-300 group-hover/item:text-[#0b8aa0]">Cargo atual</span>
                                        <span class="block mt-2 text-[14px] text-slate-900 font-medium">Desenvolvedor Full Stack</span>
                                        <span class="block mt-2 text-sm text-slate-500">Tech Solutions</span>
                                        <span class="block mt-2 text-xs text-slate-400">desde jan. 2025</span>
                                    </div>
                                    
                                    <!-- Experiência Anterior: Efeito individual de profundidade e cor -->
                                    <div class="rounded-[24px] border border-slate-100 bg-slate-50/50 p-5 transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-1 hover:border-[#0b8aa0]/30 group/item cursor-default">
                                        <span class="block text-[16px] uppercase tracking-widest font-bold transition-colors duration-300 group-hover/item:text-[#0b8aa0]">Experiência anterior</span>
                                        <span class="block mt-2 text-[14px] text-slate-900 font-medium">Estágio em Desenvolvimento Web</span>
                                        <span class="block mt-2 text-sm text-slate-500">IFPB - João Pessoa</span>
                                        <span class="block mt-2 text-xs text-slate-400">jan. 2024 - dez. 2024</span>
                                    </div>
                                </div>

                                <!-- Estatísticas na Base -->
                                <div class="flex items-center justify-between rounded-[24px] border border-slate-100 bg-slate-50/50 p-6 transition-colors duration-300 group-hover:bg-white/50">
                                    <div class="flex flex-col items-center flex-1">
                                        <span class="text-[12px] uppercase tracking-wider font-bold">Conexões</span>
                                        <strong class="text-xl font-black text-[#0b8aa0]">152</strong>
                                    </div>
                                    <div class="h-8 w-px bg-slate-200"></div>
                                    <div class="flex flex-col items-center flex-1">
                                        <span class="text-[12px] uppercase tracking-wider font-bold">Seguidores</span>
                                        <strong class="text-xl font-black text-[#0b8aa0]">98</strong>
                                    </div>
                                    <div class="h-8 w-px bg-slate-200"></div>
                                    <div class="flex flex-col items-center flex-1">
                                        <span class="text-[12px] uppercase tracking-wider font-bold">Publicações</span>
                                        <strong class="text-xl font-black text-[#0b8aa0]">12</strong>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </main>
    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
