<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu perfil</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>

    <main class="min-h-[calc(100vh-65px-150px)] bg-slate-50 py-10">
        <div class="mx-auto max-w-7xl px-6">
            <div class="rounded-[32px] border border-slate-200 bg-white p-8 shadow-[0_35px_60px_-30px_rgba(15,23,42,0.4)]">
                <div class="flex flex-col gap-10 xl:flex-row xl:items-start">
                    <div class="flex-shrink-0 rounded-[28px] border border-slate-200 bg-slate-50 p-8 shadow-sm xl:w-[340px]" id="profile-container">
                        
                    </div>

                    <div class="flex-1 space-y-6">
                        <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm" id="github-container">
                            
                        </div>

                        <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm" id="linkedin-container">
                            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                                <p class="text-xs uppercase tracking-[0.22em] text-slate-500">Trajeto no LinkedIn</p>
                                <a href="#" class="text-sm font-semibold text-sky-700 transition hover:text-sky-900">Ver perfil</a>
                            </div>

                            <div class="mt-6 grid gap-4 xl:grid-cols-[1fr_auto]">
                                <div class="space-y-4">
                                    <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-5">
                                        <p class="text-xs uppercase tracking-[0.22em] text-slate-500">Cargo atual</p>
                                        <p class="mt-3 text-base font-medium text-slate-900">Desenvolvedor Full Stack</p>
                                        <p class="mt-1 text-sm text-slate-500">Tech Stack • desde jan. 2025</p>
                                    </div>
                                    <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-5">
                                        <p class="text-xs uppercase tracking-[0.22em] text-slate-500">Experiência anterior</p>
                                        <p class="mt-3 text-base font-medium text-slate-900">Estágio em Desenvolvimento Web</p>
                                        <p class="mt-1 text-sm text-slate-500">IFPB - João Pessoa • jan. 2024 - dez. 2024</p>
                                    </div>
                                </div>

                                <div class="grid gap-4 rounded-[24px] border border-slate-200 bg-slate-50 p-5">
                                    <div class="flex items-center justify-between gap-4">
                                        <span class="text-sm text-slate-500">Conexões</span>
                                        <strong class="text-xl text-slate-900">152</strong>
                                    </div>
                                    <div class="flex items-center justify-between gap-4">
                                        <span class="text-sm text-slate-500">Seguidores</span>
                                        <strong class="text-xl text-slate-900">98</strong>
                                    </div>
                                    <div class="flex items-center justify-between gap-4">
                                        <span class="text-sm text-slate-500">Publicações</span>
                                        <strong class="text-xl text-slate-900">12</strong>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
