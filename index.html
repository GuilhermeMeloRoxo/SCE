<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Notícias - SCE</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>

    <!-- postagens do mural -->
    <main class="container">
        <h1>Mural de Notícias - IFPB JP</h1>
        <div id="mural-posts" class="mural-grid">

        </div>
    </main>

    <!-- botão de feedback -->
    <form id="feedback" method="post">
        <button class="btn-feedback" id="btn-feedback" type="button">Feedback</button>
        <div class="hidden-feedback" id="hidden-feedback">
            <textarea class="msg-feedback" id="msg-feedback" name="mensagem" minlength="10" maxlength="500" placeholder="Deixe o seu comentário aqui, no mínimo 10 caracteres."></textarea>
            <button class="submit-feedback" id="submit-feedback" type="submit">Enviar</button>
        </div>
    </form>

    <!-- autoexplicativo-->
    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
