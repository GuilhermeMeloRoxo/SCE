<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Notícias - SCE</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>
    <!-- postagens do mural -->
    <main class="container">
        <div id="search" class="search"></div>
        <h1>Mural de Notícias - IFPB JP</h1>
        <div id="mural-posts" class="mural-grid">
            <div class="flex w-full items-center justify-center">
                <svg class="animate-spin h-20 w-20 mt-30 text-[#e0e0e0]" fill="none" viewBox="0 0 24 24">
                    <use href="/icons.svg#carregando"></use>
                </svg>
            </div>
        </div>
    </main>

    <!-- botão de feedback -->
    <form id="feedback" method="post" class="relative">
        
        <button class="flex items-center gap-2 px-6 py-3 bg-[#0b8aa0] text-white rounded-full hover:bg-[#087487] cursor-pointer transition-all shadow-lg" id="btn-feedback" type="button">
            <span id="chat" class="material-symbols-outlined text-xl">chat</span>
            <span id="feedback-text" class="font-bold">Enviar Feedback</span>
            <svg id="feedback-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                <use href="/icons.svg#carregando"></use>
            </svg>
        </button>

        <div id="hidden-feedback" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
            
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden relative p-8">
                
                <div class="flex items-center justify-between m-2">
                    <div class="flex items-center gap-3 text-[#0b8aa0]">
                        <span class="material-symbols-outlined !text-2xl">chat</span>
                        <span class="text-2xl font-bold text-[#0b8aa0]">Enviar Feedback</span>
                    </div>
                    <button type="button" data-fechar="true" class="material-symbols-outlined text-gray-800 cursor-pointer !text-3xl">close</button>
                </div>
                
                <p class="text-gray-500 text-sm mt-4 mb-6 text-center italic">Sua opinião é muito importante para nós!</p>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold m-2">Tipo de Feedback *</label>
                        <div class="relative">
                        <select required class="px-4 py-2.5 w-full cursor-pointer border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition appearance-none bg-white">
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="Sugestão">Sugestão</option>
                            <option value="Problema">Problema</option>
                            <option value="Elogio">Elogio</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="fill-current h-4 w-4" xmlns="http://w3.org" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                            </svg>
                        </div>
                    </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold m-2">Assunto (opcional)</label>
                        <input type="text" placeholder="Digite um assunto" class="px-4 py-2.5 w-full border border-gray-300 rounded-3xl text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-bold m-2">Mensagem *</label>
                        <textarea required id="msg-feedback" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-3xl h-34 resize-none text-sm focus:ring-2 focus:ring-[#087487] focus:border-transparent outline-none transition" 
                            name="mensagem" minlength="10" maxlength="500"
                            placeholder="Conte-nos o que você pensa, sugestões, problemas ou elogios."></textarea>
                        </div>
                </div>

                <div class="flex items-center justify-end gap-4 mt-8">
                    <button type="button" id="cancel-feedback" data-fechar="true" class="px-6 py-2 border border-gray-300 rounded-3xl text-sm font-bold text-[#0b8aa0] hover:bg-gray-100 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <svg id="cancel-feedback-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                            <use href="/icons.svg#carregando"></use>
                        </svg>
                        <span id="cancel-feedback-text">Cancelar</span>
                    </button>
                    <button type="submit" id="submit-feedback" class="px-8 py-2 bg-[#0b8aa0] hover:bg-[#087487] text-white rounded-3xl text-sm font-bold flex items-center gap-2 cursor-pointer shadow-lg transition duration-300 active:scale-95 active:shadow-2xl">
                        <svg id="submit-feedback-spinner" class="hidden animate-spin h-6 w-6 text-[#e0e0e0]" fill="none">
                            <use href="/icons.svg#carregando"></use>
                        </svg>
                        <span id="submit-feedback-text">Enviar</span>
                    </button>
                </div>

                <div class="mt-6 flex items-center justify-center gap-2 text-[12px] text-gray-400 font-bold">
                    <span class="material-symbols-outlined !text-sm">lock</span>
                    Suas informações são sigilosas e utilizadas apenas para melhorias.
                </div>
            </div>
        </div>
    </form>

    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
