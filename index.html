<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Notícias - SCE</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
    <!-- menu hamburguer -->
    <header>
        <nav id="navbar" class="navbar">

        </nav>
    </header>
    <!-- postagens do mural -->
    <main class="container">
        <div id="search" class="search"></div>
        <h1>Mural de Notícias - IFPB JP</h1>
        <div id="mural-posts" class="mural-grid">
            <div class="flex w-full items-center justify-center">
                <svg class="animate-spin h-20 w-20 mt-30 text-[#e0e0e0]" fill="none" viewBox="0 0 24 24">
                    <use href="/icons.svg#carregando"></use>
                </svg>
            </div>
        </div>
    </main>

    <!-- botão de feedback -->
    <form id="feedback" method="post" class="relative">
        
        <!-- Botão que abre o feedback (conforme o design lateral) -->
        <button class="flex items-center gap-2 px-6 py-3 bg-[#087487] text-white rounded-full hover:bg-[#076376] cursor-pointer transition-all shadow-lg" id="btn-feedback" type="button">
            <span class="material-symbols-outlined text-xl">chat</span>
            <span class="font-medium">Enviar Feedback</span>
        </button>

        <!-- Modal (O "hidden-feedback" agora como um Card flutuante) -->
        <!-- Remova 'hidden' para visualizar enquanto estiliza -->
        <div id="hidden-feedback" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
            
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden relative p-8">
                
                <!-- Cabeçalho do Modal -->
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-3 text-[#11a3b5]">
                        <span class="material-symbols-outlined text-3xl font-light">chat_bubble</span>
                        <h2 class="text-2xl font-semibold">Enviar Feedback</h2>
                    </div>
                    <button type="button" data-fechar="true" class="material-symbols-outlined text-gray-400 hover:text-gray-600 cursor-pointer text-2xl">close</button>
                </div>
                
                <p class="text-gray-500 text-sm mb-6 text-center italic">Sua opinião é muito importante para nós!</p>

                <!-- Campos do Formulário -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tipo de Feedback</label>
                        <select class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#11a3b5]/50">
                            <option>Selecione uma opção</option>
                            <option>Sugestão</option>
                            <option>Problema</option>
                            <option>Elogio</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Assunto (opcional)</label>
                        <input type="text" placeholder="Digite um assunto" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#11a3b5]/50">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Mensagem</label>
                        <textarea class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg h-32 resize-none focus:outline-none focus:ring-2 focus:ring-[#11a3b5]/50" 
                                name="mensagem" minlength="10" maxlength="500" 
                                placeholder="Conte-nos o que você pensa, sugestões, problemas ou elogios."></textarea>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="flex items-center justify-end gap-3 mt-8">
                    <button type="button" data-fechar="true" class="px-6 py-2.5 text-gray-500 font-semibold hover:bg-gray-100 cursor-pointer rounded-lg transition-colors">Cancelar</button>
                    <button type="submit" class="px-8 py-2.5 bg-[#11a3b5] text-white font-semibold rounded-lg hover:bg-[#0e8a9a] cursor-pointer transition-colors shadow-md">Enviar</button>
                </div>

                <!-- Rodapé do Modal -->
                <div class="mt-6 flex items-center justify-center gap-2 text-[10px] text-gray-400">
                    <span class="material-symbols-outlined text-xs">lock</span>
                    Suas informações são sigilosas e utilizadas apenas para melhorias.
                </div>
            </div>
        </div>
    </form>

    <!-- autoexplicativo-->
    <footer>
        <div id="footer">

        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
